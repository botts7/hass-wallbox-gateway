<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img"
     aria-label="Wallbox Gateway icon">
  <title>Wallbox Gateway</title>
  <!--
    E6a — bridge composition.
    Two blue endpoint orbs connected through a central amber bolt by
    two converging signal arcs per side. Reads as "gateway bridges
    two endpoints" — BLE source on one side, HA / MQTT on the other.
    Transparent background; colors #3b82f6 (primary blue) and
    #f59e0b (amber accent).
  -->
