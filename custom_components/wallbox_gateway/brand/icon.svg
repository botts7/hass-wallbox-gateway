  <path d="M 206 120 Q 166 80 140 108" stroke="#3b82f6" stroke-width="10"
        fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 206 136 Q 166 176 140 148" stroke="#3b82f6" stroke-width="10"
