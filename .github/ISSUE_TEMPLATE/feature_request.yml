name: Feature request / idea
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the problem or the use case — not just the solution. What's annoying or missing today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: How might it work?
      description: Optional — any thoughts on how it could behave, or an example from another integration.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I've searched existing issues and requests for something similar
          required: true
