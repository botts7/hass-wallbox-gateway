blueprint:
  name: Wallbox Gateway — Scheduled charge to target (HA-driven)
  description: >
    Start charging at a time you choose, once the car is plugged in, and stop
    when it reaches a target battery level — all from Home Assistant, with no
    reliance on the charger's native schedule.


    The target SOC can be a fixed % **or** driven by any entity, so it's fully
    dynamic: point it at an input_number you set for the morning, or a template
    sensor you build from your average daily travel / a calendar / tariff — the
    blueprint just reads the live target each run.


    It turns the charging switch ON at the start time (or when you plug in after
    it) while below target, and OFF when the target is reached (or at an optional
    hard stop time). It only acts inside that window, so manual charges at other
    times are left alone.
  domain: automation
  source_url: https://github.com/botts7/hass-wallbox-gateway/blob/main/blueprints/automation/wallbox_gateway/scheduled_charge.yaml
  input:
    charge_switch:
      name: Charging switch
      description: The Wallbox Gateway "Charging" switch (ON starts, OFF stops).
      selector:
        entity:
          domain: switch
    connected_entity:
      name: Car connected sensor
      description: >
        The binary_sensor that's ON when the car is plugged in
        (Wallbox Gateway -> "Car Connected").
      selector:
        entity:
          domain: binary_sensor
    soc_entity:
      name: Battery level sensor
      description: The car's current battery % (used to decide when to stop).
      selector:
        entity:
          domain: sensor
          device_class: battery
    target_soc_entity:
      name: Dynamic target source (optional)
      description: >
        An entity holding the desired target battery % — e.g. an input_number,
        or a template sensor computed from average daily travel / calendar /
        tariff. If set, it overrides the fixed target below, so the goal can
        change automatically day to day.
      default:
      selector:
        entity:
          domain:
            - input_number
            - sensor
            - number
    target_soc_fixed:
      name: Target battery level (%) — used when no dynamic source is set
      default: 80
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider
    soc_max_age_min:
      name: Ignore battery level if older than (minutes)
      description: >
        If the battery sensor is staler than this, the target check is not
        trusted to STOP the charge (avoids a stale reading ending a charge
        early). 0 = never treat as stale.
      default: 60
      selector:
        number:
          min: 0
          max: 1440
          unit_of_measurement: min
          mode: box
    start_time:
      name: Start time
      description: When to begin charging (if the car is plugged in).
      selector:
        time:
    stop_time:
      name: Hard stop time (optional)
      description: >
        A safety cut-off — charging stops at this time even if the target
        isn't reached. Leave at 00:00:00 to disable (stop only on target).
      default: "00:00:00"
      selector:
        time:

mode: single
max_exceeded: silent

variables:
  charge_switch: !input charge_switch
  connected_entity: !input connected_entity
  soc_entity: !input soc_entity
  target_soc_entity: !input target_soc_entity
  target_soc_fixed: !input target_soc_fixed
  soc_max_age: !input soc_max_age_min
  start_time: !input start_time
  stop_time: !input stop_time

trigger:
  - platform: time
    at: !input start_time
    id: start
  - platform: state
    entity_id: !input connected_entity
    to: "on"
    id: plugged
  - platform: state
    entity_id: !input soc_entity
    id: soc
  - platform: time
    at: !input stop_time
    id: stop

action:
  - variables:
      # Effective target: dynamic entity if set + readable, else the fixed value.
      target: >
        {% if target_soc_entity not in [none, ''] and has_value(target_soc_entity) %}
          {{ states(target_soc_entity) | float(target_soc_fixed | float(80)) }}
        {% else %}
          {{ target_soc_fixed | float(80) }}
        {% endif %}
      soc_now: "{{ states(soc_entity) | float(-1) }}"
      soc_fresh: >
        {% if not has_value(soc_entity) %}
          false
        {% else %}
          {% set age = (now() - states[soc_entity].last_updated).total_seconds() / 60 %}
          {{ (soc_max_age | float(0) == 0) or (age <= (soc_max_age | float(0))) }}
        {% endif %}
      connected: "{{ is_state(connected_entity, 'on') }}"
      in_window: >
        {% set n = now().strftime('%H:%M:%S') %}
        {% if stop_time in ['00:00:00', start_time] %}
          {{ n >= start_time }}
        {% elif start_time < stop_time %}
          {{ start_time <= n < stop_time }}
        {% else %}
          {{ n >= start_time or n < stop_time }}
        {% endif %}
  - choose:
      # Hard stop time reached (only when a real stop time is configured).
      - conditions:
          - "{{ trigger.id == 'stop' }}"
          - "{{ stop_time not in ['00:00:00', start_time] }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: "{{ charge_switch }}"
      # Battery reached target (trust only a fresh reading) -> stop.
      - conditions:
          - "{{ trigger.id == 'soc' }}"
          - "{{ soc_fresh and soc_now >= target }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: "{{ charge_switch }}"
      # Start / continue: in the window, plugged in, and below target
      # (or SOC not yet trustworthy — start anyway; the soc branch stops it
      # once a fresh reading confirms target).
      - conditions:
          - "{{ trigger.id in ['start', 'plugged', 'soc'] }}"
          - "{{ connected }}"
          - "{{ in_window }}"
          - "{{ (not soc_fresh) or (soc_now < target) }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: "{{ charge_switch }}"
