blueprint:
  name: Wallbox Gateway — Plugged in, no schedule prompt
  description: >
    When the car is plugged in but there's no charge scheduled, prompt you to
    start one — so the car doesn't sit plugged in doing nothing.


    Detects "no schedule" from the Wallbox Gateway's **Next scheduled charge**
    sensor being empty (no enabled charger schedule). The notification is
    actionable: a **Start charging now** button, and a tap-through to a page
    where you can set a time.


    Use this when you rely on neither the charger's native schedule nor the
    HA-driven "Scheduled charge to target" blueprint — i.e. ad-hoc charging.
    Don't enable it alongside those (it would prompt even though a plan
    already exists).
  domain: automation
  source_url: https://github.com/botts7/hass-wallbox-gateway/blob/main/blueprints/automation/wallbox_gateway/no_schedule_prompt.yaml
  input:
    connected_entity:
      name: Car connected sensor
      description: Binary_sensor that's ON when the car is plugged in (Wallbox Gateway -> "Car Connected").
      selector:
        entity:
          domain: binary_sensor
    next_charge_entity:
      name: Next-charge sensor
      description: >
        The Wallbox Gateway "Next scheduled charge" timestamp sensor. When it's
        empty (unavailable), there's no charger schedule -> you get prompted.
      selector:
        entity:
          domain: sensor
          device_class: timestamp
    notify_device:
      name: Notify device
      selector:
        device:
          integration: mobile_app
    charge_switch:
      name: Charging switch (optional, for the "Start now" button)
      description: The Wallbox Gateway "Charging" switch. If set, the prompt gets a "Start charging now" button.
      default:
      selector:
        entity:
          domain: switch
    charging_entity:
      name: Charging sensor (optional)
      description: If set, the prompt is suppressed while this binary_sensor shows the car is already charging.
      default:
      selector:
        entity:
          domain: binary_sensor
    prompt_delay:
      name: Wait this long after plugging in before prompting
      description: Debounce so a brief reconnect doesn't prompt.
      default:
        minutes: 2
      selector:
        duration:
    message:
      name: Notification message
      default: "You're plugged in but there's no charge scheduled. Start now, or set a time."
      selector:
        text:
    title:
      name: Notification title
      default: "Wallbox — plugged in, no schedule"
      selector:
        text:
    tap_path:
      name: Open this page when tapped (optional)
      description: e.g. a Lovelace view with your charge controls / scheduler.
      default: ""
      selector:
        text:
    soc_entity:
      name: Battery level sensor (optional)
      description: If set, the prompt is skipped when the car is already at/above the threshold (fresh readings only).
      default:
      selector:
        entity:
          domain: sensor
          device_class: battery
    soc_threshold:
      name: Skip when battery at or above (%)
      default: 80
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider
    soc_max_age_min:
      name: Ignore battery level if older than (minutes)
      default: 60
      selector:
        number:
          min: 0
          max: 1440
          unit_of_measurement: min
          mode: box
    quiet_start:
      name: Quiet hours start (optional)
      description: Set start = end to disable quiet hours.
      default: "00:00:00"
      selector:
        time:
    quiet_end:
      name: Quiet hours end (optional)
      default: "00:00:00"
      selector:
        time:

mode: single
max_exceeded: silent

variables:
  next_charge_entity: !input next_charge_entity
  charge_switch: !input charge_switch
  charging_entity: !input charging_entity
  soc_entity: !input soc_entity
  soc_threshold: !input soc_threshold
  soc_max_age: !input soc_max_age_min
  quiet_start: !input quiet_start
  quiet_end: !input quiet_end
  msg: !input message
  tap_path: !input tap_path

trigger:
  - platform: state
    entity_id: !input connected_entity
    to: "on"
    for: !input prompt_delay
    id: prompt
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: WB_NOSCHED_START
    id: startbtn

action:
  - choose:
      # "Start charging now" button.
      - conditions:
          - "{{ trigger.id == 'startbtn' }}"
          - "{{ charge_switch not in [none, ''] }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: "{{ charge_switch }}"
      # Plugged in with no schedule -> prompt, unless suppressed.
      - conditions:
          - "{{ trigger.id == 'prompt' }}"
          # No charger schedule (next-charge sensor empty).
          - "{{ not has_value(next_charge_entity) }}"
          # Not already charging (when a charging sensor is provided).
          - condition: template
            value_template: >
              {% if charging_entity in [none, ''] %}
                true
              {% else %}
                {{ not is_state(charging_entity, 'on') }}
              {% endif %}
          # Skip if already charged enough (fresh readings only; stale = prompt).
          - condition: template
            value_template: >
              {% if not soc_entity %}
                true
              {% elif not has_value(soc_entity) %}
                true
              {% else %}
                {% set age = (now() - states[soc_entity].last_updated).total_seconds() / 60 %}
                {% set fresh = (soc_max_age | float(0) == 0) or (age <= (soc_max_age | float(0))) %}
                {{ not (fresh and (states(soc_entity) | float(0) >= (soc_threshold | float(100)))) }}
              {% endif %}
          # Quiet hours. start == end disables it; handles past-midnight windows.
          - condition: template
            value_template: >
              {% if quiet_start == quiet_end %}
                true
              {% else %}
                {% set n = now().strftime('%H:%M:%S') %}
                {% if quiet_start < quiet_end %}
                  {{ not (quiet_start <= n < quiet_end) }}
                {% else %}
                  {{ not (n >= quiet_start or n < quiet_end) }}
                {% endif %}
              {% endif %}
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            title: !input title
            message: >
              {{ msg }}
              {%- if soc_entity and has_value(soc_entity) %} · battery {{ states(soc_entity) }}%{% endif %}
            data:
              clickAction: "{{ tap_path }}"
              actions:
                - action: "WB_NOSCHED_START"
                  title: "Start charging now"
